name: CI/CD Kiểm tra và Đóng gói (Build & Test)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Xây dựng và Chạy Tests
    runs-on: ubuntu-latest

    services:
      # GitHub Actions hỗ trợ Docker Service trực tiếp nếu cần, 
      # nhưng vì chúng ta dùng Testcontainers trong code nên không cần định nghĩa ở đây.
      # Testcontainers sẽ tự khởi tạo containers cần thiết trong lúc chạy test.

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Khởi tạo .NET SDK 10.0
      uses: actions/setup-net@v4
      with:
        dotnet-version: 10.0.x

    - name: Khôi phục các gói phụ thuộc (Restore)
      run: dotnet restore

    - name: Xây dựng giải pháp (Build)
      run: dotnet build --no-restore -c Release

    - name: Chạy Unit Tests (Kiểm tra đơn vị)
      run: dotnet test --no-build -c Release --filter Category=Unit

    - name: Chạy Integration Tests (Kiểm tra tích hợp với Docker)
      # Bước này yêu cầu Docker đang chạy trên Runner (mặc định có sẵn trên ubuntu-latest)
      run: dotnet test --no-build -c Release --filter Category=Integration

  docker-build:
    name: Đóng gói Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Thiết lập Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Đăng nhập vào GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Xây dựng và Đẩy Docker Image lên GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Tên image sẽ có dạng: ghcr.io/username/repo-name:latest
        tags: ghcr.io/${{ github.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
