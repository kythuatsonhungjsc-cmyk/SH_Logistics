name: CI/CD Kiểm tra và Đóng gói (Build & Test)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Xây dựng và Chạy Tests
    runs-on: ubuntu-latest

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v5

    - name: Khởi tạo .NET SDK 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Khôi phục các gói phụ thuộc (Restore)
      run: dotnet restore

    - name: Xây dựng giải pháp (Build)
      run: dotnet build --no-restore -c Release

    - name: Chạy Unit Tests
      run: |
        dotnet test TaskManagement.Domain.Tests/TaskManagement.Domain.Tests.csproj -c Release
        dotnet test TaskManagement.Application.Tests/TaskManagement.Application.Tests.csproj -c Release

    - name: Chạy Integration Tests (cần Docker)
      continue-on-error: true
      run: dotnet test TaskManagement.IntegrationTests/TaskManagement.IntegrationTests.csproj -c Release

  docker-build:
    name: Đóng gói Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v5

    - name: Chuyển tên repository sang chữ thường
      run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

    - name: Thiết lập Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Đăng nhập vào GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Xây dựng và Đẩy Docker Image lên GHCR
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
